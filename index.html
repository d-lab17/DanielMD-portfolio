<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Icon Design — Portfolio</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="nav">
  <div class="nav-inner">
    <span class="wordmark">Icon Design</span>
  </div>
</header>

<section class="hero">
  <div class="hero-deco" id="heroDeco" aria-hidden="true"></div>
  <div class="hero-inner">
    <p class="eyebrow">App Icon Design</p>
    <h1>App icons designed<br>for every appearance.</h1>
    <p class="lede">Each icon is built out across Default, Dark, Tinted, and Clear appearances. Scroll down to look inside.</p>

    <div class="mobile-secret" id="mobileSecret">
      <button class="mobile-secret-toggle" id="mobileSecretToggle" type="button">🔒 Got a secret?</button>
      <form class="mobile-secret-form" id="mobileSecretForm" hidden>
        <label for="mobileSecretInput">How many hours do I have in my favorite game as of writing this?</label>
        <input id="mobileSecretInput" type="text" inputmode="decimal" autocomplete="off" placeholder="0.0">
        <button type="submit">Submit</button>
      </form>
    </div>
  </div>
</section>

<section class="zoom-scene" id="zoomScene">
  <div class="zoom-sticky">

    <div class="phone-rig" id="phoneRig">
      <div class="phone">
        <div class="screen" id="screen">

          <div class="lock-content" id="lockContent">
            <div class="dynamic-island"></div>
            <div class="status-bar">
              <span class="time">9:41</span>
              <div class="status-icons">
                <svg width="18" height="12" viewBox="0 0 18 12" fill="none"><rect x="0" y="7" width="3" height="5" rx="0.8" fill="currentColor"/><rect x="5" y="5" width="3" height="7" rx="0.8" fill="currentColor"/><rect x="10" y="3" width="3" height="9" rx="0.8" fill="currentColor"/><rect x="15" y="0" width="3" height="12" rx="0.8" fill="currentColor"/></svg>
                <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 10.2C8.55 10.2 9 9.75 9 9.2C9 8.65 8.55 8.2 8 8.2C7.45 8.2 7 8.65 7 9.2C7 9.75 7.45 10.2 8 10.2Z" fill="currentColor"/><path d="M8 6.4C9.3 6.4 10.5 6.9 11.4 7.7L12.7 6.2C11.4 5.05 9.8 4.4 8 4.4C6.2 4.4 4.6 5.05 3.3 6.2L4.6 7.7C5.5 6.9 6.7 6.4 8 6.4Z" fill="currentColor"/><path d="M8 2.6C10.3 2.6 12.4 3.4 14 4.8L15.3 3.3C13.4 1.6 10.8 0.6 8 0.6C5.2 0.6 2.6 1.6 0.7 3.3L2 4.8C3.6 3.4 5.7 2.6 8 2.6Z" fill="currentColor"/></svg>
                <svg width="24" height="12" viewBox="0 0 24 12" fill="none"><rect x="0.5" y="0.5" width="20" height="11" rx="2.5" stroke="currentColor"/><rect x="2" y="2" width="17" height="8" rx="1.2" fill="currentColor"/><rect x="21.5" y="4" width="2" height="4" rx="1" fill="currentColor"/></svg>
              </div>
            </div>
            <div class="lock-time">9:41</div>
            <p class="lock-hint">Scroll to look inside</p>
          </div>

          <div class="shelf-content" id="shelfContent">
            <p class="shelf-eyebrow">Selected Icons</p>
            <div class="shelf-scene" id="shelfScene"></div>
          </div>

        </div>
      </div>
    </div>

  </div>
</section>

<div class="modal" id="modal" aria-hidden="true">
  <div class="modal-backdrop" id="modalBackdrop"></div>
  <div class="modal-card" role="dialog" aria-modal="true">
    <button class="modal-close" id="modalClose" aria-label="Close">&times;</button>
    <div class="modal-stage">
      <img id="modalImage" src="" alt="">
    </div>
    <div class="modal-info">
      <h2 id="modalTitle"></h2>
      <div class="variant-tabs" id="variantTabs"></div>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
